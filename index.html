<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndustrialForge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #222;
            min-height: 100vh;
        }

        header {
            background: #fff;
            border-bottom: 2px solid #e0e0e0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        header h1 span {
            color: #555;
        }

        nav {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #222;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: #444;
            transform: scale(1.03);
        }

        .btn-outline {
            background: transparent;
            color: #222;
            border: 2px solid #222;
        }

        .btn-outline:hover {
            background: #222;
            color: #fff;
        }

        .btn-red {
            background: #c0392b;
        }

        .btn-red:hover {
            background: #e74c3c;
        }

        .btn-green {
            background: #27ae60;
        }

        .btn-green:hover {
            background: #2ecc71;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 22px;
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            line-height: 1.6;
            color: #444;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #222;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .screenshots-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .screenshots-grid img:hover {
            transform: scale(1.05);
        }

        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .version-tag {
            background: #222;
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .date-tag {
            color: #888;
            font-size: 13px;
        }

        .user-badge {
            display: inline-block;
            background: #222;
            color: #fff;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .user-badge.admin {
            background: #8e44ad;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h2 {
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 900;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .bug-item {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .bug-item .bug-author {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .bug-item .bug-text {
            color: #444;
            font-size: 14px;
            line-height: 1.5;
        }

        .bug-item .bug-date {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #222;
        }

        .news-item {
            border-left: 4px solid #222;
            padding-left: 15px;
        }

        .img-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .img-preview.active {
            display: flex;
        }

        .img-preview img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .tab-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 20px;
            border: 2px solid #222;
            background: transparent;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #222;
            color: #fff;
        }

        .tab-btn:hover {
            background: #222;
            color: #fff;
        }

        .admin-section {
            background: #f0e6ff;
            border: 2px solid #d4b8ff;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .admin-section h3 {
            color: #6a3d9a;
            margin-bottom: 15px;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 5px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .file-info {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 13px;
            display: inline-block;
            margin: 5px 0;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
            }
            .hero h2 {
                font-size: 28px;
            }
            nav {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Industrial<span>Forge</span></h1>
    <nav id="navBar">
        <button class="btn btn-outline" onclick="showPage('home')">Главная</button>
        <button class="btn btn-outline" onclick="showPage('versions')">Версии</button>
        <button class="btn btn-outline" onclick="showPage('news')">Новости</button>
        <button class="btn btn-outline" onclick="showPage('bugs')">Нашёл баги</button>
        <span id="navUser"></span>
    </nav>
</header>

<div class="container">

    <!-- HOME PAGE -->
    <div id="page-home" class="page active">
        <div class="hero">
            <h2>IndustrialForge</h2>
            <p>Строй, создавай, автоматизируй. Твоя промышленная империя ждёт.</p>
            <button class="btn" onclick="downloadLatest()" style="padding:15px 40px;font-size:18px;">
                ⬇ Скачать последнюю версию
            </button>
            <p id="latestVersionInfo" style="margin-top:15px;font-size:14px;color:#888;"></p>
        </div>

        <div class="card">
            <h2>Последние новости</h2>
            <div id="homeNews"></div>
        </div>
    </div>

    <!-- VERSIONS PAGE -->
    <div id="page-versions" class="page">
        <h2 style="margin-bottom:20px;font-size:28px;">Версии игры</h2>
        <div id="adminVersionPanel"></div>
        <div id="versionsList"></div>
    </div>

    <!-- NEWS PAGE -->
    <div id="page-news" class="page">
        <h2 style="margin-bottom:20px;font-size:28px;">Новости</h2>
        <div id="adminNewsPanel"></div>
        <div id="newsList"></div>
    </div>

    <!-- BUGS PAGE -->
    <div id="page-bugs" class="page">
        <h2 style="margin-bottom:20px;font-size:28px;">Сообщить о баге</h2>
        <div id="bugForm"></div>
        <h3 style="margin:20px 0 15px;">Все баг-репорты</h3>
        <div id="bugsList"></div>
    </div>

</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('authModal')">&times;</button>
        <div id="authContent"></div>
    </div>
</div>

<!-- IMAGE PREVIEW -->
<div class="img-preview" id="imgPreview" onclick="this.classList.remove('active')">
    <img id="imgPreviewSrc" src="" alt="">
</div>

<script>
    // ========== DATA STORE ==========
    function getData(key, def) {
        try {
            const d = localStorage.getItem('IF_' + key);
            return d ? JSON.parse(d) : def;
        } catch { return def; }
    }
    function setData(key, val) {
        localStorage.setItem('IF_' + key, JSON.stringify(val));
    }

    const ADMINS = ['marceini', 'its'];

    // ========== AUTH ==========
    let currentUser = getData('currentUser', null);

    function isAdmin() {
        return currentUser && ADMINS.includes(currentUser.username.toLowerCase());
    }

    function renderNav() {
        const nav = document.getElementById('navUser');
        if (currentUser) {
            const badge = isAdmin() ? 'admin' : '';
            nav.innerHTML = `
                <span class="user-badge ${badge}">${currentUser.username}${isAdmin() ? ' ★' : ''}</span>
                <button class="btn btn-small btn-red" onclick="logout()">Выйти</button>
            `;
        } else {
            nav.innerHTML = `
                <button class="btn btn-small" onclick="showAuth('login')">Войти</button>
                <button class="btn btn-small btn-outline" onclick="showAuth('register')">Регистрация</button>
            `;
        }
    }

    function showAuth(mode) {
        const modal = document.getElementById('authModal');
        const content = document.getElementById('authContent');
        modal.classList.add('active');

        if (mode === 'login') {
            content.innerHTML = `
                <h2>Вход</h2>
                <div class="form-group">
                    <label>Никнейм</label>
                    <input type="text" id="loginUser" placeholder="Введите ник">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPass" placeholder="Введите пароль">
                </div>
                <p id="loginError" style="color:#e74c3c;font-size:13px;"></p>
                <button class="btn" onclick="doLogin()" style="width:100%;margin-top:10px;">Войти</button>
                <p style="text-align:center;margin-top:15px;font-size:13px;">
                    Нет аккаунта? <a href="#" onclick="showAuth('register')" style="color:#222;font-weight:700;">Регистрация</a>
                </p>
            `;
        } else {
            content.innerHTML = `
                <h2>Регистрация</h2>
                <div class="form-group">
                    <label>Никнейм</label>
                    <input type="text" id="regUser" placeholder="Придумайте ник">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPass" placeholder="Придумайте пароль">
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" id="regPass2" placeholder="Повторите пароль">
                </div>
                <p id="regError" style="color:#e74c3c;font-size:13px;"></p>
                <button class="btn" onclick="doRegister()" style="width:100%;margin-top:10px;">Зарегистрироваться</button>
                <p style="text-align:center;margin-top:15px;font-size:13px;">
                    Есть аккаунт? <a href="#" onclick="showAuth('login')" style="color:#222;font-weight:700;">Войти</a>
                </p>
            `;
        }
    }

    function doLogin() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;
        const err = document.getElementById('loginError');

        if (!username || !password) { err.textContent = 'Заполните все поля'; return; }

        const users = getData('users', []);
        const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);

        if (!user) { err.textContent = 'Неверный ник или пароль'; return; }

        currentUser = { username: user.username };
        setData('currentUser', currentUser);
        closeModal('authModal');
        renderNav();
        renderAll();
    }

    function doRegister() {
        const username = document.getElementById('regUser').value.trim();
        const password = document.getElementById('regPass').value;
        const password2 = document.getElementById('regPass2').value;
        const err = document.getElementById('regError');

        if (!username || !password) { err.textContent = 'Заполните все поля'; return; }
        if (username.length < 2) { err.textContent = 'Ник минимум 2 символа'; return; }
        if (password.length < 3) { err.textContent = 'Пароль минимум 3 символа'; return; }
        if (password !== password2) { err.textContent = 'Пароли не совпадают'; return; }

        const users = getData('users', []);
        if (users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
            err.textContent = 'Этот ник уже занят';
            return;
        }

        users.push({ username: username, password: password });
        setData('users', users);

        currentUser = { username: username };
        setData('currentUser', currentUser);
        closeModal('authModal');
        renderNav();
        renderAll();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('IF_currentUser');
        renderNav();
        renderAll();
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    // ========== PAGES ==========
    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        renderAll();
    }

    // ========== VERSIONS ==========
    function renderVersions() {
        const versions = getData('versions', []);
        const list = document.getElementById('versionsList');
        const panel = document.getElementById('adminVersionPanel');

        // Admin panel
        if (isAdmin()) {
            panel.innerHTML = `
                <div class="admin-section">
                    <h3>⚙ Добавить новую версию</h3>
                    <div class="form-group">
                        <label>Название версии</label>
                        <input type="text" id="verName" placeholder="Например: v0.2.0 Alpha">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="verDesc" placeholder="Что нового в этой версии..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Скриншоты (можно несколько)</label>
                        <input type="file" id="verScreenshots" multiple accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Установщик игры (.exe, .zip, .rar и т.д.)</label>
                        <input type="file" id="verInstaller">
                    </div>
                    <button class="btn btn-green" onclick="addVersion()">Опубликовать версию</button>
                </div>
            `;
        } else {
            panel.innerHTML = '';
        }

        // Versions list
        if (versions.length === 0) {
            list.innerHTML = '<div class="card"><p style="text-align:center;color:#999;">Пока нет версий</p></div>';
            return;
        }

        list.innerHTML = versions.slice().reverse().map((v, ri) => {
            const i = versions.length - 1 - ri;
            const screenshots = (v.screenshots || []).map(s =>
                `<img src="${s}" onclick="previewImg('${s}')" alt="screenshot">`
            ).join('');

            const deleteBtn = isAdmin() ?
                `<button class="delete-btn" onclick="deleteVersion(${i})">Удалить</button>` : '';

            const downloadBtn = v.installerName ?
                `<button class="btn btn-small" onclick="downloadVersion(${i})">⬇ Скачать ${v.installerName}</button>` :
                '<span class="file-info">Файл не прикреплён</span>';

            return `
                <div class="card">
                    <div class="version-header">
                        <div>
                            <span class="version-tag">${v.name}</span>
                            ${deleteBtn}
                        </div>
                        <span class="date-tag">${v.date}</span>
                    </div>
                    <p style="margin-top:15px;">${v.description.replace(/\n/g, '<br>')}</p>
                    ${screenshots ? `<div class="screenshots-grid">${screenshots}</div>` : ''}
                    <div style="margin-top:10px;">${downloadBtn}</div>
                </div>
            `;
        }).join('');
    }

    async function addVersion() {
        const name = document.getElementById('verName').value.trim();
        const desc = document.getElementById('verDesc').value.trim();
        const screenshotFiles = document.getElementById('verScreenshots').files;
        const installerFile = document.getElementById('verInstaller').files[0];

        if (!name) { alert('Введите название версии'); return; }
        if (!desc) { alert('Введите описание'); return; }

        const screenshots = [];
        for (let i = 0; i < screenshotFiles.length && i < 6; i++) {
            const data = await fileToBase64(screenshotFiles[i]);
            screenshots.push(data);
        }

        let installerData = null;
        let installerName = null;
        if (installerFile) {
            installerData = await fileToBase64(installerFile);
            installerName = installerFile.name;
        }

        const versions = getData('versions', []);
        versions.push({
            name,
            description: desc,
            screenshots,
            installerData,
            installerName,
            date: new Date().toLocaleDateString('ru-RU') + ' ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}),
            author: currentUser.username
        });

        try {
            setData('versions', versions);
        } catch(e) {
            alert('Ошибка: файлы слишком большие для хранения в браузере. Попробуйте файлы поменьше или без установщика.');
            return;
        }

        renderVersions();
        renderHome();
        document.getElementById('verName').value = '';
        document.getElementById('verDesc').value = '';
        document.getElementById('verScreenshots').value = '';
        document.getElementById('verInstaller').value = '';
        alert('Версия опубликована!');
    }

    function deleteVersion(index) {
        if (!confirm('Удалить эту версию?')) return;
        const versions = getData('versions', []);
        versions.splice(index, 1);
        setData('versions', versions);
        renderVersions();
        renderHome();
    }

    function downloadVersion(index) {
        const versions = getData('versions', []);
        const v = versions[index];
        if (!v || !v.installerData) { alert('Файл не найден'); return; }

        const link = document.createElement('a');
        link.href = v.installerData;
        link.download = v.installerName || 'IndustrialForge_setup';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function downloadLatest() {
        const versions = getData('versions', []);
        if (versions.length === 0) { alert('Пока нет доступных версий для скачивания'); return; }
        const latest = versions[versions.length - 1];
        if (!latest.installerData) { alert('К последней версии не прикреплён установщик'); return; }
        downloadVersion(versions.length - 1);
    }

    // ========== NEWS ==========
    function renderNews() {
        const news = getData('news', []);
        const list = document.getElementById('newsList');
        const panel = document.getElementById('adminNewsPanel');

        if (isAdmin()) {
            panel.innerHTML = `
                <div class="admin-section">
                    <h3>📰 Добавить новость</h3>
                    <div class="form-group">
                        <label>Заголовок</label>
                        <input type="text" id="newsTitle" placeholder="Заголовок новости">
                    </div>
                    <div class="form-group">
                        <label>Текст</label>
                        <textarea id="newsText" placeholder="Текст новости..."></textarea>
                    </div>
                    <button class="btn btn-green" onclick="addNews()">Опубликовать</button>
                </div>
            `;
        } else {
            panel.innerHTML = '';
        }

        if (news.length === 0) {
            list.innerHTML = '<div class="card"><p style="text-align:center;color:#999;">Пока нет новостей</p></div>';
            return;
        }

        list.innerHTML = news.slice().reverse().map((n, ri) => {
            const i = news.length - 1 - ri;
            const deleteBtn = isAdmin() ?
                `<button class="delete-btn" onclick="deleteNews(${i})">Удалить</button>` : '';
            return `
                <div class="card news-item">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px;">
                        <h3>${n.title} ${deleteBtn}</h3>
                        <span class="date-tag">${n.date} — ${n.author}</span>
                    </div>
                    <p>${n.text.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }).join('');
    }

    function addNews() {
        const title = document.getElementById('newsTitle').value.trim();
        const text = document.getElementById('newsText').value.trim();

        if (!title || !text) { alert('Заполните все поля'); return; }

        const news = getData('news', []);
        news.push({
            title,
            text,
            date: new Date().toLocaleDateString('ru-RU') + ' ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}),
            author: currentUser.username
        });
        setData('news', news);
        renderNews();
        renderHome();
        document.getElementById('newsTitle').value = '';
        document.getElementById('newsText').value = '';
        alert('Новость опубликована!');
    }

    function deleteNews(index) {
        if (!confirm('Удалить эту новость?')) return;
        const news = getData('news', []);
        news.splice(index, 1);
        setData('news', news);
        renderNews();
        renderHome();
    }

    // ========== BUGS ==========
    function renderBugs() {
        const bugs = getData('bugs', []);
        const form = document.getElementById('bugForm');
        const list = document.getElementById('bugsList');

        if (currentUser) {
            form.innerHTML = `
                <div class="card">
                    <div class="form-group">
                        <label>Опишите баг</label>
                        <textarea id="bugText" placeholder="Подробно опишите баг, как его воспроизвести..."></textarea>
                    </div>
                    <button class="btn" onclick="addBug()">Отправить баг-репорт</button>
                </div>
            `;
        } else {
            form.innerHTML = `
                <div class="card">
                    <p style="text-align:center;">
                        <button class="btn" onclick="showAuth('login')">Войдите</button>
                        чтобы сообщить о баге
                    </p>
                </div>
            `;
        }

        if (bugs.length === 0) {
            list.innerHTML = '<p style="color:#999;text-align:center;">Баг-репортов пока нет</p>';
            return;
        }

        list.innerHTML = bugs.slice().reverse().map((b, ri) => {
            const i = bugs.length - 1 - ri;
            const deleteBtn = isAdmin() ?
                `<button class="delete-btn" onclick="deleteBug(${i})">Удалить</button>` : '';
            return `
                <div class="bug-item">
                    <div class="bug-author">${b.author} ${deleteBtn}</div>
                    <div class="bug-text">${b.text.replace(/\n/g, '<br>')}</div>
                    <div class="bug-date">${b.date}</div>
                </div>
            `;
        }).join('');
    }

    function addBug() {
        const text = document.getElementById('bugText').value.trim();
        if (!text) { alert('Опишите баг'); return; }

        const bugs = getData('bugs', []);
        bugs.push({
            text,
            author: currentUser.username,
            date: new Date().toLocaleDateString('ru-RU') + ' ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})
        });
        setData('bugs', bugs);
        renderBugs();
        document.getElementById('bugText').value = '';
        alert('Баг-репорт отправлен!');
    }

    function deleteBug(index) {
        if (!confirm('Удалить баг-репорт?')) return;
        const bugs = getData('bugs', []);
        bugs.splice(index, 1);
        setData('bugs', bugs);
        renderBugs();
    }

    // ========== HOME ==========
    function renderHome() {
        const versions = getData('versions', []);
        const news = getData('news', []);
        const info = document.getElementById('latestVersionInfo');
        const homeNews = document.getElementById('homeNews');

        if (versions.length > 0) {
            const latest = versions[versions.length - 1];
            info.textContent = `Последняя версия: ${latest.name} (${latest.date})`;
        } else {
            info.textContent = 'Версии пока не опубликованы';
        }

        if (news.length === 0) {
            homeNews.innerHTML = '<p style="color:#999;">Новостей пока нет</p>';
        } else {
            const recent = news.slice(-3).reverse();
            homeNews.innerHTML = recent.map(n => `
                <div style="margin-bottom:15px;padding-bottom:15px;border-bottom:1px solid #eee;">
                    <strong>${n.title}</strong>
                    <span class="date-tag" style="margin-left:10px;">${n.date}</span>
                    <p style="margin-top:5px;">${n.text.substring(0, 150)}${n.text.length > 150 ? '...' : ''}</p>
                </div>
            `).join('');
        }
    }

    // ========== UTILS ==========
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function previewImg(src) {
        document.getElementById('imgPreviewSrc').src = src;
        document.getElementById('imgPreview').classList.add('active');
    }

    function renderAll() {
        renderHome();
        renderVersions();
        renderNews();
        renderBugs();
    }

    // Click outside modal to close
    document.getElementById('authModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal('authModal');
    });

    // ========== INIT ==========
    renderNav();
    renderAll();
</script>

</body>
</html>
